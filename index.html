<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵港湾 - 你的温暖角落</title>
    <style>
        /* --- 全局与主题变量 --- */
        :root {
            --bg-color: #fdfaf5; 
            --text-color: #5d5c5c; 
            --primary-color: #b8c6db; 
            --accent-color: #f5d1c3; 
            --card-bg: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --border-radius: 20px;
            --toast-bg: rgba(255, 255, 255, 0.9);
            --transition-soft: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #2d3035; 
            --text-color: #e0dbd1; 
            --primary-color: #8a9cb8; 
            --accent-color: #d4b8a8; 
            --card-bg: #3a3d42;
            --shadow: 0 4px 15px rgba(0,0,0,0.2);
            --toast-bg: rgba(58, 61, 66, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.9;
            padding-bottom: 50px;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        /* --- 动画与交互基础 --- */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .fade-in-up.visible { opacity: 1; transform: translateY(0); }

        .btn-general {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition-soft);
            font-size: 0.9rem;
            outline: none;
        }
        .btn-general:hover {
            background: var(--primary-color);
            color: #fff;
            box-shadow: 0 4px 10px rgba(184, 198, 219, 0.4);
        }
        .btn-general:active { transform: scale(0.98); }

        .btn-solid {
            background: var(--accent-color);
            border: none;
            color: #fff;
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            transition: var(--transition-soft);
            box-shadow: var(--shadow);
        }
        .btn-solid:hover { opacity: 0.9; box-shadow: 0 6px 15px rgba(245, 209, 195, 0.5); }
        .btn-solid:active { transform: scale(0.98); }

        /* --- 布局结构 --- */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; opacity: 0; animation: pageLoad 0.8s ease forwards; }
        @keyframes pageLoad { to { opacity: 1; } }

        header { text-align: center; padding: 40px 0; position: relative; }
        header h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 2px; }
        
        .theme-toggle {
            position: absolute; right: 10px; top: 40px;
            background: none; border: none; font-size: 1.5rem; cursor: pointer;
            color: var(--text-color); transition: var(--transition-soft);
        }
        .theme-toggle:hover { transform: rotate(15deg) scale(1.1); }

        section {
            margin-bottom: 40px; background: var(--card-bg); padding: 30px;
            border-radius: var(--border-radius); box-shadow: var(--shadow);
            transition: var(--transition-soft);
        }

        h2.section-title {
            font-size: 1.2rem; color: var(--text-color); opacity: 0.8;
            margin-bottom: 25px; font-weight: 400; text-align: center;
        }
        h2.section-title::after {
            content: ''; display: block; width: 40px; height: 2px;
            background: var(--accent-color); margin: 8px auto 0;
            transition: width 0.3s;
        }
        section:hover h2.section-title::after { width: 60px; }

        /* --- 自定义温暖弹窗 (Toast & Confirm) --- */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: var(--toast-bg); color: var(--text-color);
            padding: 12px 25px; border-radius: 30px; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); backdrop-filter: blur(5px);
            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-20px); } }

        #confirm-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(3px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1001; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #confirm-modal.active { opacity: 1; pointer-events: auto; }
        .confirm-box {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            text-align: center; max-width: 300px; transform: scale(0.9); transition: transform 0.3s;
        }
        #confirm-modal.active .confirm-box { transform: scale(1); }
        .confirm-btns { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }

        /* --- 模块 0: 心情温度计 --- */
        #mood-tracker { text-align: center; }
        .thermometer { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .mood-scale {
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem;
            background: var(--bg-color); cursor: pointer; transition: var(--transition-soft);
        }
        .mood-scale:hover, .mood-scale.active { background: var(--accent-color); transform: scale(1.1); color: #fff; }
        .trend-bar { height: 100px; display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin-top: 20px; }
        .trend-item { width: 20px; background: var(--primary-color); border-radius: 10px 10px 0 0; opacity: 0.6; transition: height 0.8s ease; }

        /* --- 模块 1: 每日心语 --- */
        #quote-container { text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .quote-anim { transition: opacity 0.5s ease, transform 0.5s ease; }
        .quote-hidden { opacity: 0; transform: scale(0.95) translateY(10px); }

        /* --- 模块 2: 呼吸与冥想 --- */
        .meditation-wrapper { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .meditation-box { flex: 1; min-width: 250px; text-align: center; }
        
        .circle-outer {
            width: 140px; height: 140px; background: var(--bg-color); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; margin: 0 auto 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }
        .circle-inner {
            width: 40px; height: 40px; background: var(--primary-color); border-radius: 50%;
            transition: transform 0.5s ease, background-color 0.5s ease;
        }
        .circle-inner.inhale { transform: scale(3.2); background: var(--primary-color); transition: transform 4s linear, background-color 4s; }
        .circle-inner.hold { transform: scale(3.2); background: var(--accent-color); transition: background-color 1s; }
        .circle-inner.exhale { transform: scale(1); background: var(--text-color); opacity: 0.5; transition: transform 8s linear, background-color 8s; }

        .progress-bg { width: 100%; height: 6px; background: var(--bg-color); border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-color); width: 0%; transition: width 1s linear; }

        /* --- 模块 3: 心情日记 --- */
        .diary-input-area { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .diary-textarea {
            width: 100%; padding: 15px; border: 1px solid var(--primary-color);
            border-radius: 15px; background: transparent; color: var(--text-color);
            resize: none; outline: none; transition: var(--transition-soft);
        }
        .diary-textarea:focus { box-shadow: 0 0 10px rgba(184, 198, 219, 0.3); }
        .diary-list { display: flex; flex-direction: column; gap: 15px; }
        .diary-item {
            background: var(--bg-color); padding: 15px; border-radius: 15px;
            position: relative; animation: slideInUp 0.4s ease;
        }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .diary-time { font-size: 0.8rem; color: var(--primary-color); margin-bottom: 5px; }
        .diary-del { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #ff7875; opacity: 0.6; }
        .diary-del:hover { opacity: 1; }

        /* --- 模块 4: 白噪音 --- */
        .noise-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .noise-item {
            width: 80px; height: 80px; border-radius: 20px; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition-soft); color: var(--text-color);
        }
        .noise-item.playing { background: var(--primary-color); color: #fff; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(184, 198, 219, 0.5); }
        .noise-item i { font-size: 1.5rem; font-style: normal; margin-bottom: 5px; }
        .volume-control { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input[type=range] { accent-color: var(--primary-color); }

        /* --- 模块 5: 自我关怀清单 --- */
        .care-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .care-item {
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            padding: 10px 15px; background: var(--bg-color); border-radius: 12px; transition: var(--transition-soft);
        }
        .care-item:hover { transform: translateX(5px); }
        .care-item.done { opacity: 0.6; text-decoration: line-through; background: transparent; border: 1px dashed var(--primary-color); }
        .care-checkbox { width: 18px; height: 18px; border: 2px solid var(--primary-color); border-radius: 50%; display: inline-block; transition: 0.3s; }
        .care-item.done .care-checkbox { background: var(--primary-color); border-color: var(--primary-color); }
        .add-care { display: flex; gap: 10px; margin-top: 20px; }
        .add-care input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--primary-color); background: transparent; color: var(--text-color); }

        /* --- 模块 6: 时光相册 --- */
        .file-input-wrapper { text-align: center; margin-bottom: 25px; }
        #photo-input { display: none; }
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .photo-item {
            border-radius: 12px; overflow: hidden; position: relative;
            box-shadow: var(--shadow); transition: var(--transition-soft);
        }
        .photo-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(245, 209, 195, 0.4); border-radius: 16px; }
        .photo-item::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(245, 209, 195, 0.2), transparent);
            opacity: 0; transition: 0.4s; pointer-events: none;
        }
        .photo-item:hover::after { opacity: 1; }
        .photo-item img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .photo-note { padding: 12px; font-size: 0.85rem; text-align: center; background: var(--card-bg); }
        .delete-btn {
            position: absolute; top: 10px; right: 10px; background: var(--toast-bg);
            border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer;
            color: #ff7875; opacity: 0; transition: 0.3s; z-index: 2;
        }
        .photo-item:hover .delete-btn { opacity: 1; }

        .empty-state { text-align: center; color: #aaa; padding: 30px 0; font-size: 0.9rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .meditation-wrapper { flex-direction: column; }
            #gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="toast-container"></div>
<div id="confirm-modal">
    <div class="confirm-box">
        <p id="confirm-text">确定要执行此操作吗？</p>
        <div class="confirm-btns">
            <button class="btn-general" id="confirm-cancel">取消</button>
            <button class="btn-solid" id="confirm-ok">确定</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换夜间模式">🌙</button>
        <h1>心灵港湾</h1>
        <p>停下来，遇见更好的自己</p>
    </header>

    <section class="fade-in-up" id="mood-tracker">
        <h2 class="section-title">今日心情温度</h2>
        <div class="thermometer" id="mood-scales">
            <div class="mood-scale" onclick="saveMood(1)" title="低落">🌧️</div>
            <div class="mood-scale" onclick="saveMood(2)" title="疲惫">☁️</div>
            <div class="mood-scale" onclick="saveMood(3)" title="平静">⛅</div>
            <div class="mood-scale" onclick="saveMood(4)" title="开心">☀️</div>
            <div class="mood-scale" onclick="saveMood(5)" title="充满能量">🌈</div>
        </div>
        <p id="mood-text" style="font-size: 0.85rem; color: #888;">记录此刻感受，允许一切发生</p>
        <div class="trend-bar" id="mood-trend"></div>
    </section>

    <section class="fade-in-up" id="quotes">
        <h2 class="section-title">每日心语</h2>
        <div id="quote-container">
            <p id="quote-text" class="quote-anim">加载中...</p>
            <p id="quote-author" class="quote-anim"></p>
            <button class="btn-general" onclick="displayRandomQuote()">换一句</button>
        </div>
    </section>

    <section class="fade-in-up" id="meditation">
        <h2 class="section-title">内心空间</h2>
        <div class="meditation-wrapper">
            <div class="meditation-box">
                <p style="margin-bottom: 15px; color: var(--primary-color);">4-7-8 呼吸法</p>
                <div class="circle-outer"><div class="circle-inner" id="breathe-circle"></div></div>
                <p id="breathe-text" style="height: 1.5rem;">准备好了吗？</p>
                <button class="btn-general" id="breathe-btn" onclick="toggleBreathing()" style="margin-top: 10px;">开始呼吸</button>
            </div>
            <div class="meditation-box">
                <p style="margin-bottom: 15px; color: var(--accent-color);">正念引导</p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
                    <button class="btn-general" style="padding: 5px 15px;" onclick="startMeditation(3)">3分钟</button>
                    <button class="btn-general" style="padding: 5px 15px;" onclick="startMeditation(5)">5分钟</button>
                </div>
                <div class="progress-bg"><div class="progress-bar" id="med-progress"></div></div>
                <p id="med-text" style="height: 3rem; font-size: 0.9rem; transition: opacity 1s;">选择时长，开始静心之旅...</p>
                <button class="btn-general" id="med-stop-btn" onclick="stopMeditation()" style="display: none; margin-top: 10px; border-color: #ff7875; color: #ff7875;">轻轻结束</button>
            </div>
        </div>
    </section>

    <section class="fade-in-up" id="white-noise">
        <h2 class="section-title">自然之声</h2>
        <p style="text-align: center; font-size: 0.8rem; margin-bottom: 15px; color:#aaa;">* 请确保设备未静音</p>
        <div class="noise-grid">
            <div class="noise-item" onclick="toggleNoise('rain', this)"><i>🌧️</i>细雨</div>
            <div class="noise-item" onclick="toggleNoise('forest', this)"><i>🌲</i>森林</div>
            <div class="noise-item" onclick="toggleNoise('stream', this)"><i>🌊</i>溪流</div>
            <div class="noise-item" onclick="toggleNoise('fire', this)"><i>🔥</i>篝火</div>
            <div class="noise-item" onclick="toggleNoise('piano', this)"><i>🎹</i>轻琴</div>
        </div>
        <div class="volume-control">
            <span>🔈</span>
            <input type="range" id="noise-volume" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume(this.value)">
            <span>🔊</span>
        </div>
        <audio id="audio-rain" loop src=""></audio>
        <audio id="audio-forest" loop src=""></audio>
        <audio id="audio-stream" loop src=""></audio>
        <audio id="audio-fire" loop src=""></audio>
        <audio id="audio-piano" loop src=""></audio>
    </section>

    <section class="fade-in-up" id="self-care">
        <h2 class="section-title">自我关怀清单</h2>
        <ul class="care-list" id="care-ul"></ul>
        <div class="add-care">
            <input type="text" id="new-care-input" placeholder="添加一件爱自己的小事...">
            <button class="btn-solid" onclick="addCareItem()">添加</button>
        </div>
    </section>

    <section class="fade-in-up" id="diary">
        <h2 class="section-title">心情小记</h2>
        <div class="diary-input-area">
            <textarea class="diary-textarea" id="diary-content" rows="3" placeholder="写下此刻的思绪，烦恼会随字迹飘散..."></textarea>
            <div style="text-align: right;">
                <button class="btn-solid" onclick="saveDiary()">封存此刻</button>
            </div>
        </div>
        <div class="diary-list" id="diary-list-container"></div>
    </section>

    <section class="fade-in-up" id="gallery">
        <h2 class="section-title">时光相册</h2>
        <div class="file-input-wrapper">
            <button class="btn-solid" onclick="document.getElementById('photo-input').click()">留住美好瞬间</button>
            <input type="file" id="photo-input" accept="image/*">
        </div>
        <div id="gallery-grid"></div>
    </section>

    <footer>
        <p>© 2026 心灵港湾 · 隐私安全，仅留存于你的设备</p>
    </footer>
</div>

<script>
    /* --- 核心工具：弹窗与 Observer --- */
    function showWarmToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 2900);
    }

    function showWarmConfirm(msg, onConfirm) {
        const modal = document.getElementById('confirm-modal');
        document.getElementById('confirm-text').innerText = msg;
        modal.classList.add('active');
        
        const btnOk = document.getElementById('confirm-ok');
        const btnCancel = document.getElementById('confirm-cancel');
        
        const cleanup = () => {
            modal.classList.remove('active');
            btnOk.removeEventListener('click', okHandler);
            btnCancel.removeEventListener('click', cleanup);
        };
        const okHandler = () => { onConfirm(); cleanup(); };
        
        btnOk.addEventListener('click', okHandler);
        btnCancel.addEventListener('click', cleanup);
    }

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));

    /* --- 主题切换 --- */
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('harbor_theme', next);
        showWarmToast(next === 'dark' ? '已为你调暗灯光 🌙' : '阳光照进来了 ☀️');
    }

    /* --- 初始化 --- */
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('harbor_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        displayRandomQuote();
        renderMoodTrend();
        renderCareList();
        renderDiary();
        loadLocalPhotos();
    });

    /* --- 0. 心情打卡 --- */
    function saveMood(score) {
        const today = new Date().toLocaleDateString();
        let moods = JSON.parse(localStorage.getItem('harbor_moods') || '{}');
        moods[today] = score;
        localStorage.setItem('harbor_moods', JSON.stringify(moods));
        
        document.querySelectorAll('.mood-scale').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        showWarmToast('收到你的心情信号，无论好坏，都抱抱你 ✨');
        renderMoodTrend();
    }
    
    function renderMoodTrend() {
        const moods = JSON.parse(localStorage.getItem('harbor_moods') || '{}');
        const container = document.getElementById('mood-trend');
        container.innerHTML = '';
        const dates = Object.keys(moods).slice(-7); // 近7天
        if(dates.length === 0) {
            container.innerHTML = '<span style="color:#aaa;font-size:0.8rem;">点亮上方图标开启记录</span>';
            return;
        }
        dates.forEach(date => {
            const h = moods[date] * 20; // 1-5分对应20-100px
            const bar = document.createElement('div');
            bar.className = 'trend-item';
            bar.style.height = '0px';
            bar.title = `${date}: ${moods[date]}分`;
            container.appendChild(bar);
            setTimeout(() => bar.style.height = h + 'px', 100);
        });
    }

    /* --- 1. 每日心语 --- */
    const quotes = [
        "在这个嘈杂的世界里，你的存在本身就是一种美好。",
        "没关系，你可以不用总是那么坚强。",
        "凡是过往，皆为序章。相信自己有重启的能力。",
        "慢慢来，比较快。给时间一点时间。",
        "你不需要变得完美，你只需要变得真实。",
        "允许自己悲伤，允许自己哭泣，那也是力量的一部分。",
        "爱自己，是一生浪漫的开始。"
    ];
    function displayRandomQuote() {
        const textEl = document.getElementById('quote-text');
        textEl.classList.add('quote-hidden');
        setTimeout(() => {
            textEl.innerText = `“${quotes[Math.floor(Math.random() * quotes.length)]}”`;
            textEl.classList.remove('quote-hidden');
        }, 500);
    }

    /* --- 2. 呼吸与冥想 --- */
    let isBreathing = false, bIntervalId = null;
    function toggleBreathing() {
        const btn = document.getElementById('breathe-btn');
        const circle = document.getElementById('breathe-circle');
        const text = document.getElementById('breathe-text');

        if (!isBreathing) {
            isBreathing = true; btn.innerText = "停止呼吸";
            runBreatheCycle(circle, text, 0);
        } else {
            isBreathing = false; btn.innerText = "开始呼吸";
            text.innerText = "做得很好，休息一下"; text.style.color = "var(--primary-color)";
            clearTimeout(bIntervalId);
            circle.className = 'circle-inner'; 
        }
    }
    function runBreatheCycle(circle, text, phase) {
        if (!isBreathing) return;
        const phases = [
            { t: "深深吸气...", c: "inhale", d: 4000, color: "var(--primary-color)" },
            { t: "感受气流，屏住...", c: "hold", d: 7000, color: "var(--accent-color)" },
            { t: "缓缓呼出，放松...", c: "exhale", d: 8000, color: "var(--text-color)" }
        ];
        text.innerText = phases[phase].t; text.style.color = phases[phase].color;
        circle.className = `circle-inner ${phases[phase].c}`;
        bIntervalId = setTimeout(() => runBreatheCycle(circle, text, (phase + 1) % 3), phases[phase].d);
    }

    let medInterval, medTimeLeft, medTotal;
    const medTexts = ["感受身体与座椅的接触...", "聆听周围细微的声音...", "思绪飘走也没关系，温柔地拉回来...", "吸气，接纳此刻...", "呼气，放下执念..."];
    function startMeditation(minutes) {
        document.getElementById('med-stop-btn').style.display = 'inline-block';
        medTotal = minutes * 60; medTimeLeft = medTotal;
        document.getElementById('med-progress').style.width = '0%';
        clearInterval(medInterval);
        showWarmToast('深呼吸，我们开始 🍃');
        
        let textIdx = 0;
        medInterval = setInterval(() => {
            medTimeLeft--;
            document.getElementById('med-progress').style.width = `${((medTotal - medTimeLeft) / medTotal) * 100}%`;
            
            if (medTimeLeft % 15 === 0) { // 每15秒换句引导语
                const textEl = document.getElementById('med-text');
                textEl.style.opacity = 0;
                setTimeout(() => { textEl.innerText = medTexts[textIdx % medTexts.length]; textEl.style.opacity = 1; textIdx++; }, 1000);
            }
            if (medTimeLeft <= 0) stopMeditation(true);
        }, 1000);
    }
    function stopMeditation(finished = false) {
        clearInterval(medInterval);
        document.getElementById('med-progress').style.width = '0%';
        document.getElementById('med-text').innerText = finished ? "冥想结束，愿你带着平静继续今天 ✨" : "已暂停，随时欢迎回来";
        document.getElementById('med-stop-btn').style.display = 'none';
    }

    /* --- 3. 白噪音 --- */
    let activeNoise = null;
    function toggleNoise(type, el) {
        const audio = document.getElementById(`audio-${type}`);
        // 演示逻辑：由于没有真实音频链接，仅做UI反馈
        if (activeNoise && activeNoise !== type) {
            document.getElementById(`audio-${activeNoise}`).pause();
            document.querySelector('.noise-item.playing')?.classList.remove('playing');
        }
        if (el.classList.contains('playing')) {
            el.classList.remove('playing'); audio.pause(); activeNoise = null;
        } else {
            el.classList.add('playing'); 
            activeNoise = type;
            // audio.play().catch(e => console.log('无有效音频源'));
            showWarmToast(`已开启${el.innerText}声音 (需配置真实音频文件)`);
        }
    }
    function updateVolume(val) { document.querySelectorAll('audio').forEach(a => a.volume = val); }

    /* --- 4. 自我关怀清单 --- */
    const defaultCare = [{id:1, t:"喝一杯温水", d:false}, {id:2, t:"深呼吸5次", d:false}, {id:3, t:"放下手机发呆3分钟", d:false}];
    function getCareList() { return JSON.parse(localStorage.getItem('harbor_care') || JSON.stringify(defaultCare)); }
    function renderCareList() {
        const list = getCareList();
        const ul = document.getElementById('care-ul');
        ul.innerHTML = list.map(item => `
            <li class="care-item ${item.d ? 'done' : ''}" onclick="toggleCare(${item.id})">
                <span class="care-checkbox"></span><span>${item.t}</span>
            </li>`).join('');
    }
    function toggleCare(id) {
        let list = getCareList();
        const item = list.find(i => i.id === id);
        if(item) { item.d = !item.d; localStorage.setItem('harbor_care', JSON.stringify(list)); renderCareList(); }
    }
    function addCareItem() {
        const input = document.getElementById('new-care-input');
        if(!input.value.trim()) return;
        let list = getCareList();
        list.push({id: Date.now(), t: input.value.trim(), d: false});
        localStorage.setItem('harbor_care', JSON.stringify(list));
        input.value = ''; renderCareList(); showWarmToast('已加入清单 📝');
    }

    /* --- 5. 心情日记 --- */
    function saveDiary() {
        const content = document.getElementById('diary-content').value.trim();
        if(!content) { showWarmToast('写点什么再封存吧~'); return; }
        let diaries = JSON.parse(localStorage.getItem('harbor_diary') || '[]');
        diaries.unshift({ id: Date.now(), time: new Date().toLocaleString(), content });
        localStorage.setItem('harbor_diary', JSON.stringify(diaries));
        document.getElementById('diary-content').value = '';
        renderDiary();
        showWarmToast('思绪已温柔封存 🌸');
    }
    function renderDiary() {
        const diaries = JSON.parse(localStorage.getItem('harbor_diary') || '[]');
        const container = document.getElementById('diary-list-container');
        if(diaries.length === 0) { container.innerHTML = '<div class="empty-state">还没有记录呢，写下第一条吧~</div>'; return; }
        container.innerHTML = diaries.map(d => `
            <div class="diary-item">
                <div class="diary-time">${d.time}</div>
                <div>${d.content}</div>
                <span class="diary-del" onclick="deleteDiary(${d.id})">✖</span>
            </div>`).join('');
    }
    function deleteDiary(id) {
        showWarmConfirm("确定要抹去这段记忆吗？", () => {
            let diaries = JSON.parse(localStorage.getItem('harbor_diary') || '[]');
            localStorage.setItem('harbor_diary', JSON.stringify(diaries.filter(d => d.id !== id)));
            renderDiary();
        });
    }

    /* --- 6. 时光相册 --- */
    document.getElementById('photo-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 1.5 * 1024 * 1024) { showWarmToast("✨ 照片有点大哦，压缩一下会更流畅～"); return; }
        
        const reader = new FileReader();
        reader.onload = function(event) {
            let photos = JSON.parse(localStorage.getItem('harbor_photos') || '[]');
            photos.unshift({ id: Date.now(), data: event.target.result, note: "美好瞬间" });
            try {
                localStorage.setItem('harbor_photos', JSON.stringify(photos));
                loadLocalPhotos(); showWarmToast('留住这份美好 ✨');
            } catch (e) { showWarmToast("浏览器空间满了，清理一下旧照片吧"); }
        };
        reader.readAsDataURL(file);
    });

    function loadLocalPhotos() {
        const photos = JSON.parse(localStorage.getItem('harbor_photos') || '[]');
        const grid = document.getElementById('gallery-grid');
        if (photos.length === 0) { grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">这里空空的，添加第一张温暖吧</div>'; return; }
        grid.innerHTML = photos.map(p => `
            <div class="photo-item">
                <img src="${p.data}" alt="memory">
                <button class="delete-btn" onclick="deletePhoto(${p.id})">✖</button>
                <div class="photo-note">${p.note}</div>
            </div>`).join('');
    }
    
    function deletePhoto(id) {
        showWarmConfirm("确定要删除这份回忆吗？删除后无法恢复哦～", () => {
            let photos = JSON.parse(localStorage.getItem('harbor_photos') || '[]');
            localStorage.setItem('harbor_photos', JSON.stringify(photos.filter(p => p.id !== id)));
            loadLocalPhotos();
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵港湾 - 沉浸式情绪陪伴</title>
    <style>
        /* ================= 1. 主题与全局变量 ================= */
        :root {
            --toast-bg: rgba(255, 255, 255, 0.9);
            --transition-soft: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --shadow: 0 8px 30px rgba(0,0,0,0.04);
            --radius: 24px;
        }
        [data-theme="light"] { --bg: #fdfaf5; --text: #5d5c5c; --primary: #b8c6db; --accent: #f5d1c3; --card: #ffffff; }
        [data-theme="dark"] { --bg: #222428; --text: #e0dbd1; --primary: #6c7a9c; --accent: #b39b8d; --card: #2d3035; --toast-bg: rgba(45,48,53,0.9); --shadow: 0 8px 30px rgba(0,0,0,0.2); }
        [data-theme="sunset"] { --bg: #f9f3ec; --text: #6b5244; --primary: #d4a373; --accent: #e29578; --card: #ffffff; }
        [data-theme="forest"] { --bg: #f0f4f1; --text: #4a5d4e; --primary: #84a98c; --accent: #cad2c5; --card: #ffffff; }
        [data-theme="deepsea"] { --bg: #f0f4f8; --text: #465775; --primary: #6c9aab; --accent: #9cb4b8; --card: #ffffff; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-main); line-height: 1.8; transition: var(--transition-soft); overflow-x: hidden; }
        
        /* 基础动态背景 */
        .bg-animation { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; overflow: hidden; opacity: 0.4; }
        .orb { position: absolute; border-radius: 50%; filter: blur(60px); animation: floatOrb 20s infinite ease-in-out alternate; }
        .orb-1 { width: 300px; height: 300px; background: var(--primary); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--accent); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.2); } }

        /* 白噪音特效背景 */
        .noise-fx { position: fixed; inset: 0; pointer-events: none; z-index: -1; opacity: 0; transition: opacity 1.5s ease; overflow: hidden; }
        .noise-fx.active { opacity: 1; }
        /* 雨声: 柔和雨丝斜向下落 */
        #fx-rain { background: repeating-linear-gradient(15deg, transparent, transparent 50px, rgba(184, 198, 219, 0.15) 50px, rgba(184, 198, 219, 0.15) 52px); background-size: 120px 120px; animation: rainFall 2s linear infinite; }
        @keyframes rainFall { 0% { background-position: 0 0; } 100% { background-position: 120px 120px; } }
        /* 森林鸟鸣: 边缘树叶状绿色光晕摇曳 */
        #fx-forest { background: radial-gradient(circle at 10% 20%, rgba(132, 169, 140, 0.15) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(132, 169, 140, 0.15) 0%, transparent 40%); animation: forestSway 8s ease-in-out infinite alternate; }
        @keyframes forestSway { 0% { transform: scale(1) rotate(-2deg); } 100% { transform: scale(1.1) rotate(2deg); } }
        /* 溪流: 底部水波纹浮动 */
        #fx-stream { background: radial-gradient(ellipse at 50% 100%, rgba(108, 154, 171, 0.15) 0%, transparent 60%); animation: streamFlow 5s infinite alternate ease-in-out; }
        @keyframes streamFlow { 0% { transform: scaleY(1) translateY(0); } 100% { transform: scaleY(1.1) translateY(-20px); } }
        /* 轻柔钢琴: 中心光点呼吸膨胀 */
        #fx-piano { background: radial-gradient(circle at 50% 50%, rgba(245, 209, 195, 0.12) 0%, transparent 50%); animation: pianoPulse 4s infinite alternate; }
        @keyframes pianoPulse { 0% { opacity: 0.6; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.2); } }
        /* 篝火: 底部暖色微弱火光闪烁 */
        #fx-fire { background: radial-gradient(ellipse at 50% 110%, rgba(226, 149, 120, 0.2) 0%, transparent 50%); animation: fireFlicker 1.5s infinite alternate ease-in-out; }
        @keyframes fireFlicker { 0% { opacity: 0.7; transform: translateY(0); } 100% { opacity: 1; transform: translateY(-10px); } }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 80px; }
        header { text-align: center; padding: 50px 0 30px; position: relative; }
        header h1 { font-size: 2.2rem; font-weight: 400; letter-spacing: 2px; margin-bottom: 10px; }
        .header-tools { position: absolute; right: 10px; top: 40px; display: flex; gap: 15px; }
        .icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text); transition: var(--transition-soft); opacity: 0.7; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }

        section { background: var(--card); border-radius: var(--radius); padding: 30px; margin-bottom: 30px; box-shadow: var(--shadow); transition: var(--transition-soft); position: relative; overflow: hidden; }
        section:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        .section-title { font-size: 1.2rem; font-weight: 500; text-align: center; margin-bottom: 25px; position: relative; z-index: 1; }
        .section-title::after { content: ''; display: block; width: 40px; height: 3px; background: var(--accent); margin: 8px auto 0; border-radius: 2px; transition: width 0.3s; }
        section:hover .section-title::after { width: 60px; }

        .btn { border: 1px solid transparent; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: var(--transition-soft); outline: none; background: transparent; }
        .btn-outline { border-color: var(--primary); color: var(--primary); }
        .btn-outline:hover, .btn-outline.active { background: var(--primary); color: var(--card); }
        .btn-solid { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 10px 25px; }
        .btn-solid:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }

        input, textarea, select { width: 100%; padding: 12px 15px; border: 1px solid var(--primary); border-radius: 12px; background: transparent; color: var(--text); font-family: inherit; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(184, 198, 219, 0.2); }

        .fade-in { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        /* 心情打卡 */
        .mood-grid { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .mood-item { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; background: var(--bg); transition: var(--transition-soft); position: relative; }
        .mood-item:hover, .mood-item.active { background: var(--accent); transform: scale(1.15); }
        .mood-item::after { content: attr(data-label); position: absolute; bottom: -20px; font-size: 0.7rem; color: var(--text); opacity: 0; transition: 0.3s; white-space: nowrap; }
        .mood-item:hover::after, .mood-item.active::after { opacity: 1; bottom: -25px; }
        .chart-container { height: 120px; display: flex; align-items: flex-end; justify-content: space-between; gap: 4px; margin-top: 30px; padding-top: 20px; border-top: 1px dashed var(--primary); }
        .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
        .chart-bar { width: 60%; background: var(--primary); border-radius: 4px 4px 0 0; opacity: 0.7; transition: height 1s ease; cursor: pointer; }
        .chart-bar:hover { opacity: 1; background: var(--accent); }
        .chart-label { font-size: 0.6rem; margin-top: 5px; color: #888; }

        /* 呼吸冥想 */
        .breath-circle-wrap { width: 160px; height: 160px; background: var(--bg); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.02); }
        .breath-circle { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; transition: transform 0.5s, background 0.5s; }

        /* 白噪音 */
        .noise-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .noise-card { width: 90px; height: 110px; background: var(--bg); border-radius: 16px; padding: 15px 5px; text-align: center; cursor: pointer; transition: var(--transition-soft); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .noise-card.playing { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transform: translateY(-5px); }
        .noise-icon { font-size: 1.8rem; margin-bottom: 5px; display: block; }
        .noise-vol { width: 80%; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.4); border-radius: 2px; margin-top: 10px; display: none; }
        .noise-card.playing .noise-vol { display: inline-block; }
        .noise-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }

        /* 站长预置音乐列表 */
        .music-list { display: flex; flex-direction: column; gap: 15px; }
        .music-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; background: var(--bg); border-radius: 15px; cursor: pointer; transition: var(--transition-soft); }
        .music-item:hover { transform: translateX(5px); box-shadow: var(--shadow); }
        .music-item.playing { background: var(--primary); color: #fff; }
        .music-item.playing .music-artist { color: rgba(255,255,255,0.8); }
        .music-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--card); display: flex; justify-content: center; align-items: center; color: var(--primary); font-size: 1.2rem; transition: var(--transition-soft); }
        .music-item.playing .music-icon { color: var(--accent); transform: scale(1.1); }
        .music-info { display: flex; flex-direction: column; }
        .music-name { font-size: 1rem; font-weight: 500; }
        .music-artist { font-size: 0.8rem; color: #888; transition: var(--transition-soft); }

        /* 瀑布流/列表 */
        .list-wrap { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .list-item { background: var(--bg); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: flex-start; transition: 0.3s; }
        .list-item:hover { transform: translateX(5px); }

        /* 照片墙 */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .photo-card { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; aspect-ratio: 1; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .photo-card:hover img { transform: scale(1.05); }
        .photo-mask { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; color: #fff; }
        .photo-card:hover .photo-mask { opacity: 1; }

        /* 弹窗与Modal */
        #toast-box { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--toast-bg); color: var(--text); padding: 12px 25px; border-radius: 30px; font-size: 0.9rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); backdrop-filter: blur(10px); animation: slideDown 0.4s ease forwards, fadeOut 0.4s ease 2.5s forwards; }
        @keyframes slideDown { from{opacity:0; transform:translateY(-20px);} to{opacity:1; transform:translateY(0);} }
        @keyframes fadeOut { to{opacity:0; transform:translateY(-20px);} }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--card); padding: 30px; border-radius: var(--radius); width: 90%; max-width: 400px; text-align: center; transform: scale(0.9); transition: 0.3s; max-height: 80vh; overflow-y: auto;}
        .modal-overlay.active .modal-content { transform: scale(1); }

        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--primary); color: #fff; margin-right: 5px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="bg-animation">
    <div class="orb orb-1"></div><div class="orb orb-2"></div>
</div>
<div id="fx-rain" class="noise-fx"></div>
<div id="fx-forest" class="noise-fx"></div>
<div id="fx-stream" class="noise-fx"></div>
<div id="fx-piano" class="noise-fx"></div>
<div id="fx-fire" class="noise-fx"></div>

<div id="toast-box"></div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal-content">
        <h3 id="confirm-title" style="margin-bottom: 15px;">确认操作</h3>
        <p id="confirm-desc" style="font-size: 0.9rem; color: #888; margin-bottom: 25px;"></p>
        <div class="flex-center">
            <button class="btn btn-outline" onclick="closeModal('confirm-modal')">取消</button>
            <button class="btn btn-solid" id="confirm-btn">确定</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="photo-modal" onclick="if(event.target===this) closeModal('photo-modal')">
    <div class="modal-content" style="max-width: 800px; padding: 10px; background: transparent; box-shadow: none;">
        <img id="preview-img" style="max-width: 100%; max-height: 80vh; border-radius: 12px; object-fit: contain;">
        <p id="preview-note" style="color: #fff; margin-top: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);"></p>
    </div>
</div>

<div class="container">
    <header>
        <h1>心灵港湾</h1>
        <p style="opacity: 0.8;">停下来，遇见更好的自己</p>
        <div class="header-tools">
            <button class="icon-btn" onclick="cycleTheme()" title="切换主题">🎨</button>
            <button class="icon-btn" onclick="exportData()" title="备份数据">💾</button>
            <button class="icon-btn" onclick="document.getElementById('import-file').click()" title="恢复数据">📂</button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
        </div>
    </header>

    <section class="fade-in">
        <h2 class="section-title">今日心情</h2>
        <div class="mood-grid" id="mood-buttons"></div>
        <div id="mood-extra" style="display: none; margin-top: 20px;">
            <input type="text" id="mood-note" placeholder="添加简短备注 (选填)..." style="margin-bottom: 10px;">
            <div class="flex-center"><button class="btn btn-solid" onclick="saveMood()">记录此刻</button></div>
        </div>
        <div class="chart-container" id="mood-chart"></div>
    </section>

    <section class="fade-in">
        <h2 class="section-title">治愈心语</h2>
        <div class="flex-center" style="margin-bottom: 20px;">
            <button class="btn btn-outline active" onclick="changeQuoteCat('all', this)">全部</button>
            <button class="btn btn-outline" onclick="changeQuoteCat('接纳', this)">接纳</button>
            <button class="btn btn-outline" onclick="changeQuoteCat('鼓励', this)">鼓励</button>
            <button class="btn btn-outline" onclick="changeQuoteCat('安抚', this)">安抚</button>
        </div>
        <div style="text-align: center; min-height: 100px; display: flex; align-items: center; justify-content: center; flex-direction: column;">
            <p id="quote-text" style="font-size: 1.2rem; margin-bottom: 10px; transition: 0.3s;"></p>
        </div>
        <div class="flex-center" style="margin-top: 20px;">
            <button class="btn btn-outline" onclick="favCurrentQuote()">⭐ 收藏</button>
            <button class="btn btn-outline" onclick="renderQuote()">换一句</button>
        </div>
    </section>

    <section class="fade-in" id="favorite-music">
        <h2 class="section-title">音乐疗愈</h2>
        <p style="text-align: center; font-size: 0.85rem; color: #888; margin-bottom: 15px;">站长精选，点击即播</p>
        
        <div class="music-list">
            <div class="music-item" onclick="playRepoMusic('song1')">
                <div class="music-icon" id="icon-song1">▶</div>
                <div class="music-info">
                    <div class="music-name">治愈轻音乐 1</div>
                    <div class="music-artist">点击播放</div>
                </div>
            </div>
            <div class="music-item" onclick="playRepoMusic('song2')">
                <div class="music-icon" id="icon-song2">▶</div>
                <div class="music-info">
                    <div class="music-name">治愈轻音乐 2</div>
                    <div class="music-artist">点击播放</div>
                </div>
            </div>
            <div class="music-item" onclick="playRepoMusic('song3')">
                <div class="music-icon" id="icon-song3">▶</div>
                <div class="music-info">
                    <div class="music-name">治愈轻音乐 3</div>
                    <div class="music-artist">点击播放</div>
                </div>
            </div>
        </div>
        <audio id="repo-audio-player" onended="onRepoMusicEnded()"></audio>
    </section>

    <section class="fade-in" style="background: var(--accent); color: #fff;">
        <h2 class="section-title" style="color: #fff;">情绪急救箱</h2>
        <div class="flex-center">
            <button class="btn" style="background: rgba(255,255,255,0.2); color:#fff;" onclick="showFirstAid('anxiety')">极度焦虑</button>
            <button class="btn" style="background: rgba(255,255,255,0.2); color:#fff;" onclick="showFirstAid('sad')">深陷悲伤</button>
            <button class="btn" style="background: rgba(255,255,255,0.2); color:#fff;" onclick="showFirstAid('anger')">愤怒失控</button>
        </div>
        <div id="first-aid-content" style="display: none; background: rgba(255,255,255,0.9); color: var(--text); padding: 20px; border-radius: 12px; margin-top: 20px;"></div>
    </section>

    <section class="fade-in">
        <h2 class="section-title">内心空间</h2>
        <div class="flex-center" style="margin-bottom: 25px;">
            <button class="btn btn-outline active" onclick="setBreathMode('478', this)">4-7-8 助眠</button>
            <button class="btn btn-outline" onclick="setBreathMode('box', this)">4-4-4 箱式平静</button>
            <button class="btn btn-outline" onclick="setBreathMode('quick', this)">快速深呼吸</button>
        </div>
        <div class="breath-circle-wrap"><div class="breath-circle" id="breath-circle"></div></div>
        <p id="breath-text" style="text-align: center; height: 1.5rem; margin-bottom: 15px; font-weight: 500;">准备好了吗？</p>
        <div class="flex-center"><button class="btn btn-solid" id="breath-btn" onclick="toggleBreathing()">开始呼吸</button></div>
    </section>

    <section class="fade-in">
        <h2 class="section-title">自然白噪音</h2>
        <div class="flex-center" style="margin-bottom: 20px;">
            <button class="btn btn-outline" style="border-color: #ff7875; color: #ff7875;" onclick="stopAllNoise()">⏹ 全部停止</button>
        </div>
        <div class="noise-grid" id="noise-grid"></div>
        <div id="audio-container" style="display:none;"></div>
    </section>

    <div style="display: flex; flex-wrap: wrap; gap: 30px;">
        <section class="fade-in" style="flex: 1; min-width: 300px;">
            <h2 class="section-title">关怀清单</h2>
            <div class="list-wrap" id="care-list" style="margin-bottom: 15px;"></div>
            <div class="flex-between">
                <input type="text" id="new-care" placeholder="添加一件爱自己的小事...">
                <button class="btn btn-outline" onclick="addCare()" style="margin-left: 10px;">添加</button>
            </div>
        </section>

        <section class="fade-in" style="flex: 1; min-width: 300px;">
            <h2 class="section-title">情绪日记</h2>
            <textarea id="diary-content" rows="3" placeholder="倾诉此刻的烦恼或喜悦..."></textarea>
            <div class="flex-between" style="margin-top: 10px;">
                <select id="diary-tag" class="btn btn-outline" style="padding: 5px 10px; width: auto;"><option>日常</option><option>宣泄</option></select>
                <button class="btn btn-solid" onclick="saveDiary()">记录</button>
            </div>
            <div class="list-wrap" id="diary-list" style="max-height: 300px; overflow-y: auto;"></div>
        </section>
    </div>

    <section class="fade-in">
        <h2 class="section-title">时光相册</h2>
        <div style="text-align: center; margin-bottom: 15px;">
            <button class="btn btn-solid" onclick="document.getElementById('photo-input').click()">上传照片</button>
            <input type="file" id="photo-input" accept="image/*" style="display: none;" onchange="uploadPhoto(event)">
        </div>
        <div class="gallery-grid" id="photo-grid"></div>
    </section>

</div>

<script>
    /* 工具与数据库 */
    const toast = msg => { const box = document.getElementById('toast-box'), el = document.createElement('div'); el.className = 'toast'; el.innerText = msg; box.appendChild(el); setTimeout(() => el.remove(), 2900); };
    let confirmCallback = null;
    const showConfirm = (title, desc, cb) => { document.getElementById('confirm-title').innerText = title; document.getElementById('confirm-desc').innerText = desc; document.getElementById('confirm-modal').classList.add('active'); confirmCallback = cb; };
    const closeModal = id => document.getElementById(id).classList.remove('active');
    document.getElementById('confirm-btn').addEventListener('click', () => { if(confirmCallback) confirmCallback(); closeModal('confirm-modal'); });
    const observer = new IntersectionObserver(entries => { entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }); }, {threshold: 0.1});
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    const db = { get: (k, d) => JSON.parse(localStorage.getItem(`harbor_${k}`)) || d, set: (k, v) => localStorage.setItem(`harbor_${k}`, JSON.stringify(v)) };

    /* 主题 */
    const themes = ['light', 'dark', 'sunset', 'forest', 'deepsea'];
    let curThemeIdx = themes.indexOf(db.get('theme', 'light')); if(curThemeIdx === -1) curThemeIdx = 0;
    document.documentElement.setAttribute('data-theme', themes[curThemeIdx]);
    const cycleTheme = () => { curThemeIdx = (curThemeIdx + 1) % themes.length; const nt = themes[curThemeIdx]; document.documentElement.setAttribute('data-theme', nt); db.set('theme', nt); toast(`已切换主题`); };

    /* 音乐播放逻辑 */
    let currentRepoSong = null;
    const repoAudio = document.getElementById('repo-audio-player');

    function playRepoMusic(id) {
        const item = document.getElementById(`icon-${id}`).closest('.music-item');
        if (currentRepoSong === id) {
            if (repoAudio.paused) { repoAudio.play(); document.getElementById(`icon-${id}`).innerText = '⏸'; item.classList.add('playing'); } 
            else { repoAudio.pause(); document.getElementById(`icon-${id}`).innerText = '▶'; item.classList.remove('playing'); }
            return;
        }
        if (currentRepoSong) {
            const prevIcon = document.getElementById(`icon-${currentRepoSong}`);
            if(prevIcon) { prevIcon.innerText = '▶'; prevIcon.closest('.music-item').classList.remove('playing'); }
        }
        repoAudio.src = `${id}.mp3`;
        repoAudio.play().catch(e => toast(`未找到文件，请上传 ${id}.mp3`));
        currentRepoSong = id;
        document.getElementById(`icon-${id}`).innerText = '⏸'; item.classList.add('playing');
    }
    function onRepoMusicEnded() {
        if (currentRepoSong) {
            const icon = document.getElementById(`icon-${currentRepoSong}`);
            if(icon) { icon.innerText = '▶'; icon.closest('.music-item').classList.remove('playing'); }
            currentRepoSong = null;
        }
    }

    /* 心情打卡 */
    const moodDefs = [ {s: 1, i: '🌧️', l: '低落'}, {s: 2, i: '☁️', l: '疲惫'}, {s: 3, i: '⛅', l: '平静'}, {s: 4, i: '☀️', l: '开心'}, {s: 5, i: '🌈', l: '雀跃'} ];
    let selectedMood = null;
    const renderMoodBtns = () => { document.getElementById('mood-buttons').innerHTML = moodDefs.map(m => `<div class="mood-item" data-label="${m.l}" onclick="selectMood(${m.s}, this)">${m.i}</div>`).join(''); };
    const selectMood = (s, el) => { document.querySelectorAll('.mood-item').forEach(e => e.classList.remove('active')); el.classList.add('active'); selectedMood = s; document.getElementById('mood-extra').style.display = 'block'; };
    const saveMood = () => { if(!selectedMood) return; let moods = db.get('moods', {}); moods[new Date().toLocaleDateString()] = { score: selectedMood, note: document.getElementById('mood-note').value }; db.set('moods', moods); toast('记录成功'); document.getElementById('mood-extra').style.display = 'none'; renderChart(); };
    const renderChart = () => {
        const moods = db.get('moods', {}), dates = Object.keys(moods).slice(-7), wrap = document.getElementById('mood-chart');
        if(!dates.length) { wrap.innerHTML = '<p style="color:#aaa; font-size:0.8rem; width:100%; text-align:center;">点亮今天的心情吧</p>'; return; }
        wrap.innerHTML = dates.map(d => `<div class="chart-bar-wrap"><div style="font-size:0.8rem; margin-bottom:5px;">${moodDefs.find(x=>x.s===moods[d].score).i}</div><div class="chart-bar" style="height:0" data-h="${(moods[d].score/5)*100}px"></div><div class="chart-label">${d.split('/').slice(1).join('/')}</div></div>`).join('');
        setTimeout(() => document.querySelectorAll('.chart-bar').forEach(b => b.style.height = b.getAttribute('data-h')), 100);
    };

    /* 治愈心语 */
    const quoteDB = [{c:'接纳', t:"你不需要变得完美，你只需要变得真实。"},{c:'鼓励', t:"即使在最黑暗的夜晚，星星依然闪烁。"},{c:'安抚', t:"慢慢来，比较快。给时间一点时间。"}];
    let curCat = 'all', curQuoteTxt = "";
    const changeQuoteCat = (c, btn) => { document.querySelectorAll('#quotes .btn-outline').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curCat = c; renderQuote(); };
    const renderQuote = () => { let pool = curCat === 'all' ? quoteDB : quoteDB.filter(q=>q.c===curCat); const q = pool[Math.floor(Math.random()*pool.length)]; curQuoteTxt = q.t; const el = document.getElementById('quote-text'); el.style.opacity = 0; setTimeout(() => { el.innerText = `“${q.t}”`; el.style.opacity = 1; }, 300); };
    const favCurrentQuote = () => { toast("已收藏至备忘录 ⭐"); };

    /* 情绪急救 */
    const firstAidDB = { anxiety: "1. 深呼吸 3 次。<br>2. 找到身边 5 件具体的物品念出名字。", sad: "1. 抱抱自己或毯子。<br>2. 喝杯温水，允许眼泪流下。", anger: "1. 离开现场去洗手间。<br>2. 用冷水洗脸降温。" };
    const showFirstAid = t => { const box = document.getElementById('first-aid-content'); box.innerHTML = firstAidDB[t]; box.style.display = 'block'; };

    /* 呼吸冥想 */
    const bModes = { '478': [{t:"吸气...", d:4000, c:"scale(3)"}, {t:"屏息...", d:7000, c:"scale(3)"}, {t:"呼气...", d:8000, c:"scale(1)"}], 'box': [{t:"吸...", d:4000, c:"scale(3)"}, {t:"屏...", d:4000, c:"scale(3)"}, {t:"呼...", d:4000, c:"scale(1)"}, {t:"屏...", d:4000, c:"scale(1)"}], 'quick': [{t:"深吸...", d:3000, c:"scale(3)"}, {t:"力呼...", d:3000, c:"scale(1)"}] };
    let bMode = '478', bRun = false, bTimer;
    const setBreathMode = (m, btn) => { document.querySelectorAll('#meditation .btn-outline').forEach(b => b.classList.remove('active')); btn.classList.add('active'); bMode = m; if(bRun) { toggleBreathing(); toggleBreathing(); } };
    const toggleBreathing = () => { const btn = document.getElementById('breath-btn'), circle = document.getElementById('breath-circle'), text = document.getElementById('breath-text'); if(!bRun) { bRun = true; btn.innerText = "停止"; btn.style.background = "#ff7875"; runBreath(circle, text, 0); } else { bRun = false; btn.innerText = "开始呼吸"; btn.style.background = "var(--accent)"; clearTimeout(bTimer); circle.style.transform = "scale(1)"; text.innerText = "准备好了吗？"; } };
    const runBreath = (c, t, s) => { if(!bRun) return; const p = bModes[bMode][s]; t.innerText = p.t; c.style.transition = `transform ${p.d}ms linear`; c.style.transform = p.c; bTimer = setTimeout(() => runBreath(c, t, (s + 1) % bModes[bMode].length), p.d); };

    /* 自然白噪音 */
    const noiseDB = [
        {id:'rain', i:'🌧️', n:'雨声'}, {id:'forest', i:'🌲', n:'森林鸟鸣'},
        {id:'stream', i:'🌊', n:'溪流'}, {id:'piano', i:'🎹', n:'轻柔钢琴'},
        {id:'fire', i:'🔥', n:'篝火'}
    ];
    const initNoise = () => { 
        const grid = document.getElementById('noise-grid'), ac = document.getElementById('audio-container'); 
        noiseDB.forEach(n => { 
            grid.innerHTML += `<div class="noise-card" id="card-${n.id}" onclick="toggleNoise('${n.id}')">
                <span class="noise-icon">${n.i}</span><div style="font-size:0.8rem;">${n.n}</div>
                <input type="range" class="noise-vol" min="0" max="1" step="0.1" value="0.5" onclick="event.stopPropagation()" oninput="changeVol('${n.id}', this.value)">
                </div>`; 
            ac.innerHTML += `<audio id="audio-${n.id}" loop src="${n.id}.mp3"></audio>`; 
        }); 
    };
    const toggleNoise = id => { 
        const a = document.getElementById(`audio-${id}`), c = document.getElementById(`card-${id}`), fx = document.getElementById(`fx-${id}`);
        if(c.classList.contains('playing')) { 
            a.pause(); c.classList.remove('playing'); fx.classList.remove('active');
        } else { 
            a.volume = c.querySelector('.noise-vol').value;
            a.play().catch(()=>toast(`需在仓库放 ${id}.mp3`)); 
            c.classList.add('playing'); fx.classList.add('active');
        } 
    };
    const changeVol = (id, val) => { document.getElementById(`audio-${id}`).volume = val; };
    const stopAllNoise = () => { 
        noiseDB.forEach(n => { 
            document.getElementById(`audio-${n.id}`).pause(); 
            document.getElementById(`card-${n.id}`).classList.remove('playing'); 
            document.getElementById(`fx-${n.id}`).classList.remove('active');
        }); 
    };

    /* 关怀与日记 */
    const renderCareList = () => { document.getElementById('care-list').innerHTML = db.get('care', [{id:1, t:"喝杯温水", d:false}]).map(i => `<div class="list-item" style="${i.d?'opacity:0.5; text-decoration:line-through;':''}"><label style="display:flex; align-items:center; gap:10px;"><input type="checkbox" ${i.d?'checked':''} onchange="toggleCare(${i.id})"> ${i.t}</label><span style="color:#ff7875;cursor:pointer;" onclick="delCare(${i.id})">✖</span></div>`).join(''); };
    const addCare = () => { const v = document.getElementById('new-care').value.trim(); if(!v) return; let l = db.get('care', []); l.push({id: Date.now(), t: v, d: false}); db.set('care', l); document.getElementById('new-care').value = ''; renderCareList(); };
    const toggleCare = id => { let l = db.get('care', []); const i = l.find(x => x.id === id); if(i) i.d = !i.d; db.set('care', l); renderCareList(); };
    const delCare = id => { db.set('care', db.get('care', []).filter(i => i.id !== id)); renderCareList(); };

    const renderDiary = () => { document.getElementById('diary-list').innerHTML = db.get('diary', []).map(d => `<div class="list-item" style="flex-direction:column; gap:5px;"><div class="flex-between" style="width:100%;"><span class="tag">${d.tag}</span><span style="font-size:0.8rem; color:#888;">${d.time}</span></div><div>${d.content}</div><div style="text-align:right;width:100%;"><span style="color:#ff7875;cursor:pointer;font-size:0.8rem;" onclick="delDiary(${d.id})">删除</span></div></div>`).join(''); };
    const saveDiary = () => { const c = document.getElementById('diary-content').value.trim(); if(!c) return; let d = db.get('diary', []); d.unshift({ id: Date.now(), tag: document.getElementById('diary-tag').value, time: new Date().toLocaleDateString(), content: c }); db.set('diary', d); document.getElementById('diary-content').value=''; renderDiary(); toast("已记录"); };
    const delDiary = id => { showConfirm('删除日记', '确定要抹去这段记忆吗？', () => { db.set('diary', db.get('diary', []).filter(d => d.id !== id)); renderDiary(); }); };

    /* 相册 */
    const renderPhotos = () => { document.getElementById('photo-grid').innerHTML = db.get('photos', []).map(p => `<div class="photo-card" onclick="openPhoto('${p.data}')"><img src="${p.data}" loading="lazy"><div class="photo-mask"><button class="btn btn-solid" style="padding:4px 10px; font-size:0.7rem;" onclick="event.stopPropagation(); delPhoto(${p.id})">删除</button></div></div>`).join(''); };
    const uploadPhoto = e => { const f = e.target.files[0]; if(!f) return; if(f.size > 2*1024*1024) return toast("图片需小于2MB"); const r = new FileReader(); r.onload = ev => { let p = db.get('photos', []); p.unshift({ id: Date.now(), data: ev.target.result }); try { db.set('photos', p); renderPhotos(); } catch(err) { toast('存储满'); } }; r.readAsDataURL(f); };
    const delPhoto = id => { showConfirm('删除照片', '确定删除？', () => { db.set('photos', db.get('photos', []).filter(p => p.id !== id)); renderPhotos(); }); };
    const openPhoto = src => { document.getElementById('preview-img').src = src; document.getElementById('photo-modal').classList.add('active'); };

    /* 备份恢复 */
    const exportData = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(localStorage)], {type:'application/json'})); a.download = '备份.json'; a.click(); toast("已备份"); };
    const importData = e => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); Object.keys(d).forEach(k => { if(k.startsWith('harbor_')) localStorage.setItem(k, d[k]); }); toast("恢复成功，即将刷新"); setTimeout(()=>location.reload(), 1500); } catch(err){toast("格式错误");} }; r.readAsText(f); };

    document.addEventListener('DOMContentLoaded', () => { renderMoodBtns(); renderChart(); renderQuote(); initNoise(); renderCareList(); renderDiary(); renderPhotos(); });
</script>
</body>
</html>

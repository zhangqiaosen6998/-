<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵港湾 - 你的温暖角落</title>
    <style>
        /* 全局样式 - 莫兰迪疗愈色系 */
        :root {
            --bg-color: #fdfaf5; /* 奶油米 */
            --text-color: #5d5c5c; /* 深灰蓝 */
            --primary-color: #b8c6db; /* 柔蓝 */
            --accent-color: #f5d1c3; /* 柔粉 */
            --card-bg: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            padding-bottom: 50px;
        }

        /* 布局 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        header {
            text-align: center;
            padding: 60px 0 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            font-weight: 300;
            letter-spacing: 2px;
        }

        header p {
            color: #888;
            margin-top: 10px;
        }

        /* 模块通用样式 */
        section {
            margin-bottom: 50px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        h2.section-title {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 25px;
            font-weight: 400;
            text-align: center;
            position: relative;
        }
        
        h2.section-title::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: var(--accent-color);
            margin: 8px auto 0;
        }

        /* --- 1. 心语卡片 --- */
        #quote-container {
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #quote-text {
            font-size: 1.3rem;
            color: #4a4a4a;
            margin-bottom: 20px;
            font-weight: 300;
        }

        #quote-author {
            font-size: 0.9rem;
            color: #999;
        }

        .btn-refresh {
            background: none;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            background: var(--primary-color);
            color: white;
        }

        /* --- 2. 呼吸冥想 --- */
        #breathing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .circle-outer {
            width: 150px;
            height: 150px;
            background: #e6eef8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .circle-inner {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.8;
            /* 动画定义在 JS 中触发 */
        }
        
        @keyframes breathe {
            0% { transform: scale(1); }
            45% { transform: scale(2.8); } /* 吸气 */
            55% { transform: scale(2.8); } /* 屏息 */
            100% { transform: scale(1); } /* 呼气 */
        }

        #breathe-text {
            font-size: 1rem;
            color: var(--primary-color);
            font-weight: bold;
        }

        /* --- 3. 时光相册 --- */
        #gallery-controls {
            text-align: center;
            margin-bottom: 20px;
        }

        /* 自定义上传按钮样式 */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: none;
            background-color: var(--accent-color);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }

        #photo-input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        #gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .photo-item {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            position: relative;
        }

        .photo-item:hover {
            transform: translateY(-5px);
        }

        .photo-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .photo-note {
            padding: 10px;
            font-size: 0.85rem;
            color: #777;
            text-align: center;
            border-top: 1px solid #eee;
        }
        
        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,255,255,0.7);
            color: #ff7875;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            line-height: 18px;
            font-size: 12px;
            display: none;
        }
        
        .photo-item:hover .delete-btn {
            display: block;
        }

        /* 页脚 */
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #bbb;
            margin-top: 30px;
        }

        /* 响应式适配 */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .container { padding: 10px; }
            section { padding: 20px; }
            #gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;}
            .photo-item img { height: 120px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>心灵港湾</h1>
        <p>停下来，遇见更好的自己</p>
    </header>

    <section id="quotes">
        <h2 class="section-title">每日心语</h2>
        <div id="quote-container">
            <p id="quote-text">加载中...</p>
            <p id="quote-author"></p>
            <button class="btn-refresh" onclick="displayRandomQuote()">再听一句</button>
        </div>
    </section>

    <section id="meditation">
        <h2 class="section-title">呼吸空间 (4-7-8 呼吸法)</h2>
        <div id="breathing-container">
            <div class="circle-outer">
                <div class="circle-inner" id="breathe-circle"></div>
            </div>
            <p id="breathe-text">准备好了吗？</p>
            <button class="btn-refresh" id="breathe-btn" onclick="toggleBreathing()">开始</button>
        </div>
    </section>

    <section id="gallery">
        <h2 class="section-title">时光相册</h2>
        <p style="text-align:center; font-size:0.8rem; color:#aaa; margin-bottom:15px;">* 照片仅保存在您的本地浏览器中，我们不会收集。</p>
        <div id="gallery-controls">
            <div class="file-input-wrapper">
                <button class="btn-upload">添加美好瞬间</button>
                <input type="file" id="photo-input" accept="image/*">
            </div>
        </div>
        <div id="gallery-grid">
            </div>
    </section>

    <footer>
        <p>© 2023 心灵港湾 · 这是一个纯静态的隐私友好网站</p>
    </footer>
</div>

<script>
    // --- 数据：暖心话语 (丰富的内容) ---
    const quotes = [
        { text: "在这个嘈杂的世界里，你的存在本身就是一种美好。", author: "佚名" },
        { text: "没关系，你可以不用总是那么坚强。", author: "心理学寄语" },
        { text: "凡是过往，皆为序章。无论发生什么，都要相信自己有重启的能力。", author: "莎士比亚 (寓意引导)" },
        { text: "心理健康不是没有问题，而是拥有应对问题的能力。", author: "佚名" },
        { text: "你不需要变得完美，你只需要变得真实。", author: "卡尔·罗杰斯" },
        { text: "每个人都是一本书，不要因为错过了一章，就全盘否定整本书。", author: "佚名" },
        { text: "接纳自己，是疗愈的开始。", author: "佚名" },
        { text: "慢慢来，比较快。给时间一点时间。", author: "生活哲学" },
        { text: "即使在最黑暗的夜晚，星星依然闪烁。", author: "佚名" },
        { text: "你值得被温柔以待，首先请你温柔对待自己。", author: "灵魂独白" }
    ];

    // --- 功能 1: 随机显示心语 ---
    function displayRandomQuote() {
        const textElement = document.getElementById('quote-text');
        const authorElement = document.getElementById('quote-author');
        
        // 简单的淡出效果
        textElement.style.opacity = 0;
        authorElement.style.opacity = 0;

        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const quote = quotes[randomIndex];
            textElement.innerText = `“${quote.text}”`;
            authorElement.innerText = `—— ${quote.author}`;
            
            // 淡入
            textElement.style.transition = 'opacity 0.5s';
            authorElement.style.transition = 'opacity 0.5s';
            textElement.style.opacity = 1;
            authorElement.style.opacity = 1;
        }, 300);
    }

    // --- 功能 2: 呼吸冥想逻辑 ---
    let isBreathing = false;
    let breatheInterval;

    function toggleBreathing() {
        const btn = document.getElementById('breathe-btn');
        const circle = document.getElementById('breathe-circle');
        const text = document.getElementById('breathe-text');

        if (!isBreathing) {
            isBreathing = true;
            btn.innerText = "停止";
            // 启动动画 (总时长 19秒: 4s吸, 7s屏, 8s呼)
            circle.style.animation = "breathe 19s infinite linear";
            
            // 同步文字引导
            const runBreatheCycle = () => {
                if (!isBreathing) return;
                text.innerText = "吸气... (4秒)";
                text.style.color = "#a7bbc7"; // 柔蓝
                
                setTimeout(() => {
                    if (!isBreathing) return;
                    text.innerText = "屏住呼吸... (7秒)";
                    text.style.color = "#f5d1c3"; // 柔粉
                }, 4000);

                setTimeout(() => {
                    if (!isBreathing) return;
                    text.innerText = "呼气... (8秒)";
                    text.style.color = "#bbb"; 
                }, 11000);
            };

            runBreatheCycle();
            breatheInterval = setInterval(runBreatheCycle, 19000);

        } else {
            isBreathing = false;
            btn.innerText = "重新开始";
            circle.style.animation = "none";
            text.innerText = "准备好了吗？";
            text.style.color = var(--primary-color);
            clearInterval(breatheInterval);
        }
    }

    // --- 功能 3: 本地时光相册逻辑 (LocalStorage) ---
    const photoInput = document.getElementById('photo-input');
    const galleryGrid = document.getElementById('gallery-grid');

    // 页面加载时加载已存照片
    document.addEventListener('DOMContentLoaded', () => {
        displayRandomQuote();
        loadLocalPhotos();
    });

    photoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 限制文件大小，防止 LocalStorage 溢出 (建议 < 2MB)
        if (file.size > 2 * 1024 * 1024) {
            alert("为了保证浏览器运行流畅，请上传小于 2MB 的照片。如果您需要存放大量高  照片，建议使用专门的云存储服务。");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            const base64Image = event.target.result;
            
            // 提示用户输入一句话
            const note = prompt("为这张照片写下一句暖心的话吧 (可选):") || "美好瞬间";
            
            savePhotoToLocal(base64Image, note);
            loadLocalPhotos(); // 刷新显示
        };
        reader.readAsDataURL(file);
    });

    function savePhotoToLocal(base64Data, note) {
        let photos = JSON.parse(localStorage.getItem('my_warm_photos') || '[]');
        // 将新照片放在最前面
        photos.unshift({ id: Date.now(), data: base64Data, note: note });
        
        try {
            localStorage.setItem('my_warm_photos', JSON.stringify(photos));
        } catch (e) {
            alert("浏览器存储空间已满（通常为5MB），无法添加更多照片。请尝试删除旧照片。");
            // 移除刚才添加的
            photos.shift();
        }
    }

    function loadLocalPhotos() {
        const photos = JSON.parse(localStorage.getItem('my_warm_photos') || '[]');
        galleryGrid.innerHTML = ''; // 清空当前显示

        if (photos.length === 0) {
            galleryGrid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#ccc; padding:40px 0;">这里还空空的，上传第一张温暖的照片吧。</p>';
            return;
        }

        photos.forEach(photo => {
            const div = document.createElement('div');
            div.className = 'photo-item';
            div.innerHTML = `
                <img src="${photo.data}" alt="warm memory">
                <button class="delete-btn" onclick="deletePhoto(${photo.id})">×</button>
                <div class="photo-note">${photo.note}</div>
            `;
            galleryGrid.appendChild(div);
        });
    }
    
    function deletePhoto(id) {
        if(!confirm("确定要删除这张珍贵的记忆吗？")) return;
        let photos = JSON.parse(localStorage.getItem('my_warm_photos') || '[]');
        photos = photos.filter(p => p.id !== id);
        localStorage.setItem('my_warm_photos', JSON.stringify(photos));
        loadLocalPhotos();
    }
</script>

</body>
</html>
